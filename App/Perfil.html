<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Perfil da Empresa - RunWise</title>
    <link rel="stylesheet" href="CSS/dashboard.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="app-container">
      <!-- MENU LATERAL -->
      <aside class="sidebar">
        <div class="sidebar-header">
          <img src="Assets/logo.png" alt="RunWise" class="logo" />
          <h2>RunWise</h2>
        </div>
        <nav class="sidebar-nav">
          <ul>
            <li>
              <a href="dashboard.html"><i class="fas fa-home"></i> Dashboard</a>
            </li>
            <li>
              <a href="financeiro.html"
                ><i class="fas fa-dollar-sign"></i> Financeiro</a
              >
            </li>
            <li>
              <a href="Produto.html"><i class="fas fa-box"></i> Produtos</a>
            </li>
            <li>
              <a href="assistente.html"
                ><i class="fas fa-robot"></i> Assistente IA</a
              >
            </li>
            <li>
              <a href="Relatorio.html"
                ><i class="fas fa-chart-bar"></i> Relatórios</a
              >
            </li>
            <li>
              <a href="Perfil.html" class="active"
                ><i class="fas fa-user"></i> Perfil</a
              >
            </li>
            <li>
              <a href="index.html" class="logout"
                ><i class="fas fa-sign-out-alt"></i> Sair</a
              >
            </li>
          </ul>
        </nav>
      </aside>

      <!-- ÁREA PRINCIPAL -->
      <main class="main-content">
        <!-- TÍTULO -->
        <div class="profile-header">
          <h1>Perfil da Empresa</h1>
        </div>

        <div class="profile-container">
          <!-- FOTO/LOGO -->
          <div class="photo-card">
            <div class="photo-upload">
              <div class="photo-placeholder">
                <i class="fas fa-building"></i>
              </div>
              <button class="btn-change-photo" title="Trocar imagem">
                <i class="fas fa-camera"></i>
              </button>
            </div>
            <p class="photo-hint">Clique na câmera para alterar o logo</p>
          </div>

          <!-- FORMULÁRIO DE INFORMAÇÕES -->
          <div class="form-card">
            <h2><i class="fas fa-building"></i> Informações da Empresa</h2>

            <div class="form-group">
              <label><i class="fas fa-briefcase"></i> Nome da Empresa</label>
              <input
                type="text"
                id="nomeUsuario"
                placeholder="Digite o Nome da sua empresa"
              />
            </div>

            <div class="form-group">
              <label><i class="fas fa-tag"></i> Segmento de Atuação</label>
              <select id="segment" disabled>
                <option value="tecnologia" selected>Tecnologia</option>
                <option value="comercio">Comércio</option>
                <option value="servicos">Serviços</option>
                <option value="industria">Indústria</option>
                <option value="alimentacao">Alimentação</option>
              </select>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label><i class="fas fa-envelope"></i> E-mail</label>
                <input
                  type="email"
                  id="email"
                  value="contato@minhaempresa.com.br"
                  disabled
                />
              </div>

              <div class="form-group">
                <label><i class="fas fa-phone"></i> Telefone</label>
                <input type="tel" id="phone" value="(11) 99999-9999" disabled />
              </div>
            </div>

            <div class="form-group">
              <label><i class="fas fa-map-marker-alt"></i> Endereço</label>
              <input
                type="text"
                id="address"
                value="Av. Paulista, 1000 - São Paulo, SP"
                disabled
              />
            </div>
          </div>

          <!-- CARD DO PLANO -->
          <div class="plan-card">
            <div class="plan-header">
              <h2><i class="fas fa-crown"></i> Plano Atual</h2>
              <button class="btn-upgrade">
                <i class="fas fa-arrow-up"></i>
                Fazer Upgrade
              </button>
            </div>

            <div class="plan-info">
              <div class="plan-badge">
                <i class="fas fa-star"></i>
                <div>
                  <div class="plan-name">Plano Pro</div>
                  <div class="plan-features">
                    Recursos ilimitados • Suporte prioritário
                  </div>
                </div>
              </div>

              <div class="plan-status">
                <i class="fas fa-check-circle"></i>
                <div>
                  <div class="status-text">Ativo</div>
                  <div class="expiry-text">Vencimento: 25/04/2026</div>
                </div>
              </div>
            </div>
          </div>

          <!-- BOTÕES -->
          <div class="action-buttons">
            <button class="btn-edit" id="btnEdit" onclick="enableEdit()">
              <i class="fas fa-edit"></i>
              Editar Informações
            </button>
            <button
              class="btn-save"
              id="btnSave"
              onclick="saveChanges()"
              disabled
            >
              <i class="fas fa-save"></i>
              Salvar Alterações
            </button>
          </div>
        </div>
      </main>
    </div>
  </body>
</html>
