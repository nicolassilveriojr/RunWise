<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aplicativo RunWise</title>
    <link rel="stylesheet" href="../App/CSS/app.style.css" />

    <!-- ícons -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <!--Google Fonts-->
    >
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <h1>Teste da API</h1>
    <div id="resultado">Carregando...</div>

    <!--TELA DE LOGUIN-->
    <div class="login-container">
      <div class="login-logo">
        <img src="Assets/colocar imagem da logo" alt="RunWise" />
        <p>Gerenciamento Empresarial Inteligente</p>
      </div>

      <!--CAIXA DE LOGIN-->
      <div class="login-box">
        <h2>Bem-Vindo de volta!</h2>

        <!--CAMPO DE EMAIL-->
        <div class="input-group">
          <i class="fas fa-envelope"></i>
          <input type="email" id="email" placeholder="Seu E-mail" />
        </div>

        <!--CAMPO DE SENHA-->
        <div class="input-group">
          <i class="fas fa-lock"></i>
          <input type="password" id="senha" placeholder="Sua senha" />
        </div>

        <!--LINK ESQUECI SENHA-->
        <a href="#" class="esqueci-senha">Esqueci minha senha</a>

        <!--BOTÃO ENTRA-->
        <button id="btn-entra" class="btn-primario">Entra</button>

        <!--SEPARADOR-->
        <div class="separador">
          <span>OU</span>
        </div>

        <!--BOTÃO CRIAR CONTA-->
        <button id="btn-cadastro" class="btn-cadastro">Criar conta</button>
      </div>
    </div>

    <script src="JS/app.js"></script>
  </body>
</html>
