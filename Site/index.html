<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/style.css" /> 
</head>
<body>

  <!-- NAVBAR -->
  <header>
    <div class="logo">
      <img src="runwise_logo.png" alt="" />
      <a class="logo-name" href="index.html">RunWise</a>
    </div>

    <nav>
      <a href="#servicos">Serviços</a>
      <a href="#sobre">Sobre</a>
      <a href="#contato">Contato</a>
    </nav>

    <div class="header-actions">

      <div class="header-search">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" placeholder="Procurar..." />
      </div>

      <div class="header-lang" id="lang-btn" onclick="toggleLang()">
        <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
        <span id="lang-selected">PT</span>
        <svg xmlns="http://www.w3.org/2000/svg" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>

        <div class="lang-dropdown" id="lang-dropdown">
          <div class="lang-option active" onclick="selectLang(event, 'PT')">PT — Português</div>
          <div class="lang-option" onclick="selectLang(event, 'EN')">EN — English</div>
          <div class="lang-option" onclick="selectLang(event, 'ES')">ES — Español</div>
        </div>
      </div>

      <button class="btn-login">Entrar</button>
      <a href="../App/index.html" class="btn-primario">Download</a>

    </div>
  </header>

  <!-- restante das seções vem aqui -->

  <footer>
    <div class="footer-logo">
      <img src="logo.png" alt="Logo" />
      <p>Inteligência que trabalha por você.</p>
    </div>
    <div class="footer-social">
      <h4>Siga-nos</h4>
      <a href="#">LinkedIn</a>
      <a href="#">Instagram</a>
      <a href="#">WhatsApp</a>
    </div>
    <div class="footer-contato">
      <h4>Contato</h4>
      <p>contato@runwise.com.br</p>
      <p>(XX) XXXXX-XXXX</p>
    </div>
    <div class="footer-copyright">
      <p>&copy; 2026 RunWise. Todos os direitos reservados.</p>
    </div>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
